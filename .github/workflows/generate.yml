name: generate

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/**'
      - 'schema/**'
      - 'package.json'

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run validate
      - run: npm run generate

      - name: Commit regenerated outputs
        run: |
          # -I ignores timestamp-only churn so we don't create noise commits.
          if git diff -I '"generated_at"' --quiet README.md README.zh-CN.md generated/; then
            echo "No substantive changes."
            git checkout -- README.md README.zh-CN.md generated/
            exit 0
          fi
          git config user.name "afs-bot"
          git config user.email "actions@users.noreply.github.com"
          git add README.md README.zh-CN.md generated/
          git commit -m "chore: regenerate outputs [skip ci]"
          git push
