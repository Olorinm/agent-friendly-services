name: validate

on:
  pull_request:

# PR workflows are read-only by design: they run forked code.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run validate

      - name: Block manual edits to generated files
        run: |
          git fetch origin "$GITHUB_BASE_REF" --depth=1
          CHANGED="$(git diff --name-only "origin/$GITHUB_BASE_REF"...HEAD)"
          BLOCKED="$(echo "$CHANGED" | grep -E '^(README\.md|generated/)' || true)"
          if [ -n "$BLOCKED" ]; then
            echo "::error::README.md and generated/ are build outputs — don't edit them in PRs. CI regenerates them on main."
            echo "$BLOCKED"
            exit 1
          fi
