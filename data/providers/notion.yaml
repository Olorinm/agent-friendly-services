id: notion
name: Notion
category: productivity-storage
homepage: https://www.notion.com
summary: Connected workspace with a versioned REST API, capability-scoped integrations, llms.txt, and an official MCP server.
submitted_by: community
scope: "Notion API integrations; the editor product itself is not assessed."

tags:
  - docs
  - workspace
  - knowledge-base

entrypoints:
  docs: https://developers.notion.com
  api_reference: https://developers.notion.com/reference/intro
  llms_txt: https://developers.notion.com/llms.txt
  status_page: https://status.notion.so
  pricing: https://www.notion.com/pricing
  signup: https://www.notion.com/signup
  api_keys: https://developers.notion.com/docs/authorization
  mcp_official: https://developers.notion.com/docs/mcp
  rate_limits: https://developers.notion.com/reference/request-limits
  errors: https://developers.notion.com/reference/status-codes

checks:
  self_serve_signup:
    status: supported
    evidence: https://www.notion.com/signup
    verified: "2026-07-07"

  api_key_self_serve:
    status: supported
    evidence: https://developers.notion.com/docs/authorization
    verified: "2026-07-07"
    notes: Internal integration tokens are self-serve.

  oauth_support:
    status: supported
    evidence: https://developers.notion.com/docs/authorization
    verified: "2026-07-07"
    notes: OAuth flow for public integrations.

  scoped_tokens:
    status: partial
    evidence: https://developers.notion.com/docs/authorization
    verified: "2026-07-07"
    notes: Integrations carry capability scopes (read/update/insert) and page-level access grants.

  token_revocation:
    status: unknown
    notes: Integrations can be removed in settings; needs a docs link as evidence.

  sandbox_or_test_mode:
    status: unknown
    notes: Free workspaces serve as test environments; no separate sandbox documented.

  free_tier_or_trial:
    status: supported
    evidence: https://www.notion.com/pricing
    verified: "2026-07-07"

  self_serve_paid_upgrade:
    status: supported
    evidence: https://www.notion.com/pricing
    verified: "2026-07-07"

  usage_dashboard:
    status: unknown

  idempotency:
    status: unknown

  versioning_policy:
    status: supported
    evidence: https://developers.notion.com/reference/versioning
    verified: "2026-07-07"
    notes: Notion-Version header with dated API versions.

  automation_permitted:
    status: unknown
    notes: ToS not yet reviewed and recorded.
