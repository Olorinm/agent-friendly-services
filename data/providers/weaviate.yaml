id: weaviate
name: Weaviate
category: databases
homepage: https://weaviate.io
summary: Open-source vector database with REST/GraphQL/gRPC APIs, Weaviate Cloud free sandboxes, an official CLI, MCP server, and llms.txt.
submitted_by: community
scope: Weaviate Cloud + open-source

tags:
  - vector-database
  - open-source

entrypoints:
  docs: https://docs.weaviate.io
  api_reference: https://docs.weaviate.io/weaviate/api/rest
  llms_txt: https://docs.weaviate.io/llms.txt
  pricing: https://weaviate.io/pricing
  signup: https://console.weaviate.cloud
  api_keys: https://console.weaviate.cloud
  cli: https://github.com/weaviate/weaviate-cli
  mcp_official: https://github.com/weaviate/mcp-server-weaviate

checks:
