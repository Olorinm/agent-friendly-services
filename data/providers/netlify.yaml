id: netlify
name: Netlify
category: cloud-hosting
homepage: https://www.netlify.com
summary: Web platform for deploying sites and functions, with an OpenAPI-specified API, llms.txt, official CLI and MCP server.
submitted_by: community

tags:
  - deployment
  - jamstack
  - serverless

entrypoints:
  docs: https://docs.netlify.com
  api_reference: https://open-api.netlify.com
  openapi: https://github.com/netlify/open-api
  llms_txt: https://docs.netlify.com/llms.txt
  changelog: https://www.netlify.com/changelog/
  status_page: https://www.netlifystatus.com
  pricing: https://www.netlify.com/pricing/
  signup: https://app.netlify.com/signup
  api_keys: https://docs.netlify.com/api/get-started/
  cli: https://docs.netlify.com/cli/get-started/
  mcp_official: https://docs.netlify.com/welcome/build-with-ai/netlify-mcp-server/

checks:
  self_serve_signup:
    status: supported
    evidence: https://app.netlify.com/signup
    verified: "2026-07-07"

  api_key_self_serve:
    status: supported
    evidence: https://docs.netlify.com/api/get-started/
    verified: "2026-07-07"

  oauth_support:
    status: supported
    evidence: https://docs.netlify.com/api/get-started/
    verified: "2026-07-07"
    notes: OAuth2 flow documented for API access alongside personal access tokens.

  scoped_tokens:
    status: unknown
    notes: PATs support expiration dates and a SAML-team access toggle, but no granular permission scopes are documented.

  token_revocation:
    status: partial
    evidence: https://docs.netlify.com/api-and-cli-guides/api-guides/get-started-with-api/
    verified: "2026-07-08"
    notes: Docs state a password reset permanently invalidates all PATs/OAuth tokens; tokens also take expiration dates. Manual per-token revocation is not explicitly documented on this page.

  sandbox_or_test_mode:
    status: supported
    evidence: https://docs.netlify.com/deploy/deploy-types/deploy-previews/
    verified: "2026-07-08"
    notes: Deploy Previews build every PR in an isolated preview before production.

  free_tier_or_trial:
    status: supported
    evidence: https://www.netlify.com/pricing/
    verified: "2026-07-07"
    notes: Free tier.

  self_serve_paid_upgrade:
    status: supported
    evidence: https://www.netlify.com/pricing/
    verified: "2026-07-07"

  usage_dashboard:
    status: supported
    evidence: https://docs.netlify.com/manage/accounts-and-billing/team-management/overview/
    verified: "2026-07-08"
    notes: Team overview covers members, billing and usage; per-product usage pages exist for Functions/Edge Functions.

  idempotency:
    status: unknown

  versioning_policy:
    status: unknown

  automation_permitted:
    status: unknown
    notes: ToS not yet reviewed and recorded.
