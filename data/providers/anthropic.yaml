id: anthropic
name: Anthropic
category: ai-models
homepage: https://www.anthropic.com
summary: Claude model APIs with agent-focused documentation, llms.txt, and the company behind the MCP standard itself.
submitted_by: community

tags:
  - llm
  - claude
  - inference

entrypoints:
  docs: https://docs.anthropic.com
  api_reference: https://docs.anthropic.com/en/api
  llms_txt: https://docs.anthropic.com/llms.txt
  changelog: https://docs.anthropic.com/en/release-notes/api
  status_page: https://status.anthropic.com
  pricing: https://www.anthropic.com/pricing
  signup: https://console.anthropic.com
  api_keys: https://docs.anthropic.com/en/api/getting-started
  cli: https://docs.anthropic.com/en/docs/claude-code
  sdks: https://docs.anthropic.com/en/api/client-sdks
  agent_docs: https://docs.anthropic.com/en/docs/agents-and-tools
  rate_limits: https://docs.anthropic.com/en/api/rate-limits
  errors: https://docs.anthropic.com/en/api/errors

checks:
  self_serve_signup:
    status: supported
    evidence: https://console.anthropic.com
    verified: "2026-07-07"

  api_key_self_serve:
    status: supported
    evidence: https://docs.anthropic.com/en/api/getting-started
    verified: "2026-07-07"

  oauth_support:
    status: unknown
    notes: No public OAuth flow for the API; API keys are the standard auth.

  scoped_tokens:
    status: partial
    evidence: https://docs.anthropic.com/en/api/rate-limits
    verified: "2026-07-07"
    notes: Keys are scoped per workspace (limits and separation per workspace); no per-permission scoping.

  token_revocation:
    status: unknown
    notes: Keys can be disabled in the console; needs a canonical docs link as evidence.

  sandbox_or_test_mode:
    status: unknown
    notes: No dedicated test mode documented.

  free_tier_or_trial:
    status: unknown
    notes: API is prepaid usage-based; no standing free tier documented.

  self_serve_paid_upgrade:
    status: supported
    evidence: https://www.anthropic.com/pricing
    verified: "2026-07-07"
    notes: Prepaid credits and usage tiers are self-serve in the console.

  usage_dashboard:
    status: supported
    evidence: https://docs.anthropic.com/en/api/rate-limits
    verified: "2026-07-07"
    notes: Console usage page; rate-limit headers expose remaining quota programmatically.

  idempotency:
    status: unknown
    notes: No documented idempotency-key mechanism.

  versioning_policy:
    status: supported
    evidence: https://docs.anthropic.com/en/api/versioning
    verified: "2026-07-07"
    notes: anthropic-version header with documented version behavior.

  automation_permitted:
    status: unknown
    notes: Usage policies not yet reviewed for autonomous agent account usage.

notes:
  - Anthropic authored the MCP standard; no first-party MCP server exposing the Anthropic API was found at review time (mcp_official intentionally absent).
  - Claude Code is listed as cli — it is an agent CLI rather than an API-management CLI.
