id: mongodb-atlas
name: MongoDB Atlas
category: databases
homepage: https://www.mongodb.com/products/platform/atlas-database
summary: Managed MongoDB with a versioned Admin API, published OpenAPI spec, llms.txt, official CLI and MCP server.
submitted_by: community
scope: "Atlas managed cloud + Atlas Administration API; self-hosted MongoDB is not assessed."

tags:
  - mongodb
  - nosql
  - managed-database

entrypoints:
  docs: https://www.mongodb.com/docs/atlas/
  api_reference: https://www.mongodb.com/docs/atlas/reference/api-resources-spec/v2/
  openapi: https://github.com/mongodb/openapi
  llms_txt: https://www.mongodb.com/docs/llms.txt
  changelog: https://www.mongodb.com/docs/atlas/release-notes/
  status_page: https://status.cloud.mongodb.com
  pricing: https://www.mongodb.com/pricing
  signup: https://www.mongodb.com/cloud/atlas/register
  api_keys: https://www.mongodb.com/docs/atlas/configure-api-access/
  cli: https://www.mongodb.com/docs/atlas/cli/
  sdks: https://www.mongodb.com/docs/drivers/
  mcp_official: https://github.com/mongodb-js/mongodb-mcp-server

checks:
  self_serve_signup:
    status: supported
    evidence: https://www.mongodb.com/cloud/atlas/register
    verified: "2026-07-07"

  api_key_self_serve:
    status: supported
    evidence: https://www.mongodb.com/docs/atlas/configure-api-access/
    verified: "2026-07-07"

  oauth_support:
    status: supported
    evidence: https://www.mongodb.com/docs/atlas/configure-api-access/
    verified: "2026-07-07"
    notes: OAuth 2.0 service accounts for the Administration API.

  scoped_tokens:
    status: supported
    evidence: https://www.mongodb.com/docs/atlas/configure-api-access/
    verified: "2026-07-07"
    notes: Role-based scoping at organization and project level.

  token_revocation:
    status: supported
    evidence: https://www.mongodb.com/docs/atlas/configure-api-access/
    verified: "2026-07-07"

  sandbox_or_test_mode:
    status: unknown
    notes: Free M0 clusters are commonly used as test environments; no separate sandbox documented.

  free_tier_or_trial:
    status: supported
    evidence: https://www.mongodb.com/pricing
    verified: "2026-07-07"
    notes: Free M0 cluster tier.

  self_serve_paid_upgrade:
    status: supported
    evidence: https://www.mongodb.com/pricing
    verified: "2026-07-07"

  usage_dashboard:
    status: unknown
    notes: Atlas console shows usage/billing; needs a canonical docs link as evidence.

  idempotency:
    status: unknown

  versioning_policy:
    status: supported
    evidence: https://www.mongodb.com/docs/atlas/reference/api-resources-spec/v2/
    verified: "2026-07-07"
    notes: Resource-versioned Administration API (v2) with date-based versioning.

  automation_permitted:
    status: unknown
    notes: ToS not yet reviewed and recorded.
