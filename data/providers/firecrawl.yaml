  pricing: https://www.firecrawl.dev/pricing
  signup: https://www.firecrawl.dev/signin/signup
  api_keys: https://docs.firecrawl.dev/introduction
  sdks: https://docs.firecrawl.dev/sdks/overview
  mcp_official: https://docs.firecrawl.dev/mcp-server
  rate_limits: https://docs.firecrawl.dev/rate-limits

checks:
