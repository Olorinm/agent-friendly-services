id: resend
name: Resend
category: communication
homepage: https://resend.com
summary: Email API for developers with test mode, scoped API keys, idempotency support, and an official MCP server.
submitted_by: community

tags:
  - email
  - transactional

entrypoints:
  docs: https://resend.com/docs
  api_reference: https://resend.com/docs/api-reference/introduction
  llms_txt: https://resend.com/llms.txt
  changelog: https://resend.com/changelog
  pricing: https://resend.com/pricing
  signup: https://resend.com/signup
  api_keys: https://resend.com/docs/dashboard/api-keys/introduction
  sdks: https://resend.com/docs/sdks
  mcp_official: https://github.com/resend/mcp-send-email
  webhooks: https://resend.com/docs/dashboard/webhooks/introduction
  errors: https://resend.com/docs/api-reference/errors

checks:
  self_serve_signup:
    status: supported
    evidence: https://resend.com/signup
    verified: "2026-07-07"

  api_key_self_serve:
    status: supported
    evidence: https://resend.com/docs/dashboard/api-keys/introduction
    verified: "2026-07-07"

  oauth_support:
    status: unknown
    notes: API-key auth only, as far as documented.

  scoped_tokens:
    status: supported
    evidence: https://resend.com/docs/dashboard/api-keys/introduction
    verified: "2026-07-07"
    notes: Keys support full-access vs sending-only permission and per-domain scoping.

  token_revocation:
    status: supported
    evidence: https://resend.com/docs/dashboard/api-keys/introduction
    verified: "2026-07-07"

  sandbox_or_test_mode:
    status: supported
    evidence: https://resend.com/docs/dashboard/emails/send-test-emails
    verified: "2026-07-07"
    notes: Reserved test addresses simulate delivered/bounced/complained outcomes safely.

  free_tier_or_trial:
    status: supported
    evidence: https://resend.com/pricing
    verified: "2026-07-07"
    notes: Free monthly email quota.

  self_serve_paid_upgrade:
    status: supported
    evidence: https://resend.com/pricing
    verified: "2026-07-07"

  usage_dashboard:
    status: unknown
    notes: Dashboard shows sending metrics; needs a docs link as evidence.

  idempotency:
    status: supported
    evidence: https://resend.com/docs/api-reference/introduction
    verified: "2026-07-07"
    notes: Idempotency-Key header on send endpoints.

  versioning_policy:
    status: unknown

  automation_permitted:
    status: unknown
    notes: ToS not yet reviewed; anti-spam rules obviously constrain sending behavior.
