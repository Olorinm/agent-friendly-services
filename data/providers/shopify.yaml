id: shopify
name: Shopify
category: commerce-marketing
homepage: https://www.shopify.com
summary: Commerce platform with versioned GraphQL APIs, llms.txt, official MCP docs, access-scoped tokens, free development stores, and a CLI.
submitted_by: community
scope: "The Shopify developer platform (Admin/Storefront APIs, apps); the merchant product itself is not assessed."

tags:
  - ecommerce
  - graphql
  - apps

entrypoints:
  docs: https://shopify.dev/docs
  api_reference: https://shopify.dev/docs/api
  graphql: https://shopify.dev/docs/api/admin-graphql
  llms_txt: https://www.shopify.com/llms.txt
  changelog: https://shopify.dev/changelog
  status_page: https://www.shopifystatus.com
  pricing: https://www.shopify.com/pricing
  signup: https://www.shopify.com/free-trial
  api_keys: https://shopify.dev/docs/apps/build/authentication-authorization
  cli: https://shopify.dev/docs/api/shopify-cli
  mcp_official: https://shopify.dev/docs/apps/build/storefront-mcp
  webhooks: https://shopify.dev/docs/apps/build/webhooks
  rate_limits: https://shopify.dev/docs/api/usage/rate-limits

checks:
  self_serve_signup:
    status: supported
    evidence: https://www.shopify.com/free-trial
    verified: "2026-07-07"
    notes: Store/partner sign-up is self-serve (the accounts subdomain blocks probes, so the trial page is cited).

  api_key_self_serve:
    status: supported
    evidence: https://shopify.dev/docs/apps/build/authentication-authorization
    verified: "2026-07-07"
    notes: App credentials and access tokens are issued self-serve from the dev dashboard.

  oauth_support:
    status: supported
    evidence: https://shopify.dev/docs/apps/build/authentication-authorization
    verified: "2026-07-07"

  scoped_tokens:
    status: supported
    evidence: https://shopify.dev/docs/api/usage/access-scopes
    verified: "2026-07-07"
    notes: Granular access scopes per app/token.

  token_revocation:
    status: unknown
    notes: Tokens can be revoked by uninstalling apps or rotating credentials; needs the canonical docs link as evidence.

  sandbox_or_test_mode:
    status: supported
    evidence: https://shopify.dev/docs/api/development-stores
    verified: "2026-07-07"
    notes: Free development stores are the documented test environment.

  free_tier_or_trial:
    status: supported
    evidence: https://www.shopify.com/free-trial
    verified: "2026-07-07"
    notes: Free trial for merchants; development stores are free for partners.

  self_serve_paid_upgrade:
    status: supported
    evidence: https://www.shopify.com/pricing
    verified: "2026-07-07"

  usage_dashboard:
    status: unknown

  idempotency:
    status: unknown
    notes: Some GraphQL mutations accept idempotency-style unique keys; no general policy page recorded yet.

  versioning_policy:
    status: supported
    evidence: https://shopify.dev/docs/api/usage/versioning
    verified: "2026-07-07"
    notes: Quarterly API versions with a documented support window.

  automation_permitted:
    status: unknown
    notes: Partner Program agreement not yet reviewed and recorded.
