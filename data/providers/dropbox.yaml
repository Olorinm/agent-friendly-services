id: dropbox
name: Dropbox
category: productivity-storage
homepage: https://www.dropbox.com
summary: File storage and sync with a scoped-OAuth HTTP API, self-serve app creation, and webhooks.
submitted_by: community

tags:
  - storage
  - files
  - sync

entrypoints:
  docs: https://www.dropbox.com/developers/documentation
  api_reference: https://www.dropbox.com/developers/documentation/http/documentation
  status_page: https://status.dropbox.com
  pricing: https://www.dropbox.com/plans
  signup: https://www.dropbox.com/register
  api_keys: https://www.dropbox.com/developers/apps
  cli: https://github.com/dropbox/dbxcli
  webhooks: https://www.dropbox.com/developers/reference/webhooks

checks:
  self_serve_signup:
    status: supported
    evidence: https://www.dropbox.com/register
    verified: "2026-07-07"

  api_key_self_serve:
    status: supported
    evidence: https://www.dropbox.com/developers/apps
    verified: "2026-07-07"
    notes: App creation in the developer console is self-serve; access tokens can be generated there for development.

  oauth_support:
    status: supported
    evidence: https://developers.dropbox.com/oauth-guide
    verified: "2026-07-07"

  scoped_tokens:
    status: supported
    evidence: https://developers.dropbox.com/oauth-guide
    verified: "2026-07-07"
    notes: Scoped access is the standard model; apps request granular scopes.

  token_revocation:
    status: unknown
    notes: An /auth/token/revoke endpoint exists in the HTTP reference (client-rendered, not probe-verifiable); needs a stable docs anchor as evidence.

  sandbox_or_test_mode:
    status: unknown
    notes: Development apps with limited users serve as a de-facto test mode; needs the canonical docs framing as evidence.

  free_tier_or_trial:
    status: supported
    evidence: https://www.dropbox.com/plans
    verified: "2026-07-07"
    notes: Free Basic plan; the API works on it.

  self_serve_paid_upgrade:
    status: supported
    evidence: https://www.dropbox.com/plans
    verified: "2026-07-07"

  usage_dashboard:
    status: unknown

  idempotency:
    status: unknown

  versioning_policy:
    status: unknown
    notes: API v2 is stable and additive; no formal deprecation policy page recorded.

  automation_permitted:
    status: unknown
    notes: ToS not yet reviewed and recorded.
