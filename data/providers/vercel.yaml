id: vercel
name: Vercel
category: cloud-hosting
homepage: https://vercel.com
summary: Frontend cloud for deploying web apps, with a REST API, CLI, official MCP server, and AI SDK ecosystem.
submitted_by: community

tags:
  - deployment
  - serverless
  - frontend

entrypoints:
  docs: https://vercel.com/docs
  api_reference: https://vercel.com/docs/rest-api
  llms_txt: https://vercel.com/llms.txt
  changelog: https://vercel.com/changelog
  status_page: https://www.vercel-status.com
  pricing: https://vercel.com/pricing
  signup: https://vercel.com/signup
  api_keys: https://vercel.com/guides/how-do-i-use-a-vercel-api-access-token
  cli: https://vercel.com/docs/cli
  sdks: https://vercel.com/docs/rest-api/sdk
  mcp_official: https://vercel.com/docs/mcp/vercel-mcp
  agent_docs: https://vercel.com/docs/agents
  webhooks: https://vercel.com/docs/webhooks
  rate_limits: https://vercel.com/docs/limits
  errors: https://vercel.com/docs/errors

checks:
  self_serve_signup:
    status: supported
    evidence: https://vercel.com/signup
    verified: "2026-07-07"

  api_key_self_serve:
    status: supported
    evidence: https://vercel.com/guides/how-do-i-use-a-vercel-api-access-token
    verified: "2026-07-07"

  oauth_support:
    status: supported
    evidence: https://vercel.com/docs/integrations
    verified: "2026-07-07"
    notes: OAuth-based integration platform for third-party apps.

  scoped_tokens:
    status: partial
    evidence: https://vercel.com/guides/how-do-i-use-a-vercel-api-access-token
    verified: "2026-07-07"
    notes: Tokens are scoped to account or team, not to fine-grained permissions.

  token_revocation:
    status: supported
    evidence: https://vercel.com/guides/how-do-i-use-a-vercel-api-access-token
    verified: "2026-07-07"

  sandbox_or_test_mode:
    status: supported
    evidence: https://vercel.com/docs/deployments/environments
    verified: "2026-07-07"
    notes: Preview deployments give every change an isolated test environment.

  free_tier_or_trial:
    status: supported
    evidence: https://vercel.com/pricing
    verified: "2026-07-07"
    notes: Hobby plan is free.

  self_serve_paid_upgrade:
    status: supported
    evidence: https://vercel.com/pricing
    verified: "2026-07-07"

  usage_dashboard:
    status: supported
    evidence: https://vercel.com/docs/pricing/understanding-my-invoice
    verified: "2026-07-07"
    notes: Usage page in dashboard; invoice/usage docs.

  idempotency:
    status: unknown

  versioning_policy:
    status: partial
    evidence: https://vercel.com/docs/rest-api
    verified: "2026-07-07"
    notes: Endpoints are individually versioned (v6, v13, ...); no single published deprecation policy found.

  automation_permitted:
    status: unknown
    notes: ToS not yet reviewed for automated/agent account usage.
