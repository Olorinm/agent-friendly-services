id: discord
name: Discord
category: communication
homepage: https://discord.com
summary: Chat platform with a versioned bot/OAuth2 API, official OpenAPI spec (preview), webhooks, and documented rate limits.
submitted_by: community
scope: "The Discord developer platform (bots, OAuth2 apps, webhooks); the consumer client is not assessed."

tags:
  - chat
  - bots
  - community

entrypoints:
  docs: https://discord.com/developers/docs/intro
  api_reference: https://discord.com/developers/docs/reference
  openapi: https://github.com/discord/discord-api-spec
  changelog: https://discord.com/developers/docs/change-log
  status_page: https://discordstatus.com
  signup: https://discord.com/register
  api_keys: https://discord.com/developers/applications
  webhooks: https://discord.com/developers/docs/resources/webhook
  rate_limits: https://discord.com/developers/docs/topics/rate-limits
  errors: https://discord.com/developers/docs/topics/opcodes-and-status-codes

checks:
  self_serve_signup:
    status: supported
    evidence: https://discord.com/register
    verified: "2026-07-07"

  api_key_self_serve:
    status: supported
    evidence: https://discord.com/developers/applications
    verified: "2026-07-07"
    notes: Bot tokens are issued instantly when you create an application in the developer portal.

  oauth_support:
    status: supported
    evidence: https://discord.com/developers/docs/topics/oauth2
    verified: "2026-07-07"

  scoped_tokens:
    status: supported
    evidence: https://discord.com/developers/docs/topics/oauth2
    verified: "2026-07-07"
    notes: OAuth2 scopes plus per-guild bot permission flags.

  token_revocation:
    status: supported
    evidence: https://discord.com/developers/docs/topics/oauth2
    verified: "2026-07-07"
    notes: Token revocation endpoint documented; bot tokens can be reset in the portal.

  sandbox_or_test_mode:
    status: unknown
    notes: No formal sandbox; standard practice is a private test server. Needs official guidance as evidence.

  free_tier_or_trial:
    status: supported
    evidence: https://discord.com/developers/docs/intro
    verified: "2026-07-07"
    notes: The API is free to use.

  self_serve_paid_upgrade:
    status: not_applicable
    notes: No paid API tier; monetization products are user-facing.

  usage_dashboard:
    status: unknown

  idempotency:
    status: unknown

  versioning_policy:
    status: supported
    evidence: https://discord.com/developers/docs/reference
    verified: "2026-07-07"
    notes: Explicit API versioning (v10) with documented deprecation of old versions.

  automation_permitted:
    status: partial
    evidence: https://discord.com/developers/docs/intro
    verified: "2026-07-07"
    notes: Automation through the bot API is the supported path; automating user accounts ("self-bots") is prohibited by the developer terms (ToS page blocks probes, so the docs portal is cited).

notes:
  - The official OpenAPI spec is published by Discord but marked public preview / subject to change.
