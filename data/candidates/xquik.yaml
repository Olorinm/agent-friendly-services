id: xquik
name: Xquik
category: web-search-data
homepage: https://xquik.com
summary: Hosted X data and account automation service with a REST API, official MCP server, OpenAPI, SDKs, HMAC webhooks, and OAuth 2.1.
submitted_by: vendor

tags:
  - x-data
  - social-media
  - automation

entrypoints:
