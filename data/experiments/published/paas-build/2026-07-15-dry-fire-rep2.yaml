  friction_notes:
    - >-
      No REST 'list/read' endpoint exists at all — paas.build only exposes 3 POST endpoints (identify, go-live,
      checkout); go-live is itself account creation/signup so it's off-limits for this test, leaving checkout as the
      only crediential-consuming call.
    - >-
      Official docs (SKILL.md, llms-full.txt, /agents, llms.txt) never document an error-response shape or status code
      for invalid credentials, so there is no documented 401/403 shape to match against.
    - >-
      Auth rejection for an invalid vendorId is returned as an outer HTTP 502 with the real 401/Unauthorized only
      visible embedded in the JSON body ({"status":401,"raw":{...}}) — this is inconsistent with REST convention and
      would cause naive retry-on-5xx client logic to misclassify a permanent auth failure as transient.
    - >-
      Confirmed via contrast tests that endpoint/method/headers/body-shape are correct: empty body gives a distinct 400
      'vendorId and amount required', and a wrong path gives a clean 404 'not found', so the 502+embedded-401 on the
      fake vendorId is a genuine, repeatable auth rejection and not a routing failure.
    - >-
      MCP server README (raw.githubusercontent.com/UNIPaaS/paas-build-mcp) contains no curl/header examples beyond
      what's in SKILL.md; no Authorization header format is documented anywhere for the direct /api/checkout call, only
      the vendorId in the JSON body.
