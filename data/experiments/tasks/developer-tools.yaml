category: developer-tools
task: file-issue-and-confirm
scenario: >
  File an issue titled exactly "{{NONCE}}" in the designated test
  repository/project, with a short body noting it was filed autonomously by an
  AI agent, then read it back via the API and report its id and URL.
provisioning:
  - element: API token scoped to the test repository/project
    delivery: curl config file
  - element: designated empty test repository/project
    delivery: created by human beforehand
verification:
  method: state
  how: runner fetches issues via the API and requires one whose title equals the nonce exactly
cleanup: runner closes the created issue (kept as evidence, closed)
provider_overrides:
  postman: variant — create a collection named "{{NONCE}}" in the designated workspace and read it back
